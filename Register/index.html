<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Baloo+Bhai+2:wght@400..800&family=Tagesschrift&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Registration</title>
  </head>
  <body>
    <div class="logo"><p id="n">N</p><p>ote<p id="n">N</p><p>est</p></div></p>
    <div class="container">
        
      <h1>Registration</h1>
      <form action="post">
        <div class="name">
          <input type="text" placeholder="First name" />
          <input type="text" placeholder="Last name" />
        </div>
        <div class="email">
          <input type="email" name="" id="" placeholder="E-Mail" />
        </div>
        <div class="pass">
          <input type="password" name="" id="" placeholder="Password" />
        </div>
        <div class="selection">
          <select name="" id="">
            <option value="who are you">--Who are you--</option>
            <option value="Reader">Reader</option>
            <option value="Verifier">Verifier</option>
          </select>
        </div>
        <div class="cond">
          <input type="checkbox" id="condition">
          <label for="conditions">I agree to the <a href="#">Terms and Conditions and Privacy Policy</a>.</label>
        </div>
        <button type="submit">Register</button>
      </form>
    </div>
  </body>
